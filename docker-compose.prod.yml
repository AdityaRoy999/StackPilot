version: "3.9"
name: dokscp

x-dokscp-logging: &dokscp-logging
  driver: json-file
  options:
    max-size: ${DOKSCP_LOG_MAX_SIZE:-10m}
    max-file: ${DOKSCP_LOG_MAX_FILE:-5}

services:
  caddy:
    image: caddy:2.8-alpine
    container_name: dokscp-caddy
    restart: unless-stopped
    logging: *dokscp-logging
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
      - grafana

  postgres:
    image: postgres:16-alpine
    container_name: dokscp-postgres
    restart: unless-stopped
    logging: *dokscp-logging
    environment:
      POSTGRES_USER: ${DB_USER:?Set DB_USER in .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_NAME:?Set DB_NAME in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: dokscp-redis
    restart: unless-stopped
    logging: *dokscp-logging
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dokscp-backend
    restart: unless-stopped
    logging: *dokscp-logging
    environment:
      - DOKSCP_ENV=production
      - DOKSCP_REQUIRE_HTTPS=true
      - DOKSCP_TRUST_PROXY_HEADERS=true
      - DOKSCP_API_RATE_LIMIT_PER_MINUTE=${DOKSCP_API_RATE_LIMIT_PER_MINUTE:-240}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:?Set DB_NAME in .env}
      - DB_USER=${DB_USER:?Set DB_USER in .env}
      - DB_PASSWORD=${DB_PASSWORD:?Set DB_PASSWORD in .env}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - DOKSCP_REDIS_QUEUE=${DOKSCP_REDIS_QUEUE:-dokscp:jobs:deployment}
      - DOKSCP_JOB_WORKERS=${DOKSCP_JOB_WORKERS:-2}
      - DOKSCP_JOB_MAX_ATTEMPTS=${DOKSCP_JOB_MAX_ATTEMPTS:-3}
      - PROMETHEUS_PUBLIC_URL=${PROMETHEUS_PUBLIC_URL:-https://${DOKSCP_DOMAIN}/prometheus}
      - GRAFANA_PUBLIC_URL=${GRAFANA_PUBLIC_URL:-https://${DOKSCP_DOMAIN}/grafana}
      - LOKI_PUBLIC_URL=${LOKI_PUBLIC_URL:-https://${DOKSCP_DOMAIN}/grafana/explore}
      - DOKSCP_METRICS_BEARER_TOKEN=${DOKSCP_METRICS_BEARER_TOKEN:-}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - JWT_EXPIRY_SECONDS=${JWT_EXPIRY_SECONDS:-3600}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY:?Set TOKEN_ENCRYPTION_KEY in .env}
      - CORS_ALLOWED_ORIGIN=https://${DOKSCP_DOMAIN:?Set DOKSCP_DOMAIN in .env}
      - FRONTEND_PUBLIC_URL=https://${DOKSCP_DOMAIN:?Set DOKSCP_DOMAIN in .env}
      - BACKEND_PUBLIC_URL=https://${DOKSCP_DOMAIN:?Set DOKSCP_DOMAIN in .env}
      - DOKSCP_AUTH_REGISTRATION_MODE=${DOKSCP_AUTH_REGISTRATION_MODE:-first_user_only}
      - DOKSCP_AUTH_INVITE_CODE=${DOKSCP_AUTH_INVITE_CODE:-}
      - ACME_EMAIL=${ACME_EMAIL:?Set ACME_EMAIL in .env}
      - APP_PASSWORD=${APP_PASSWORD:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-DOKSCP Platform}
      - BUILD_WORKSPACE_DIR=/app/uploads/builds
      - SOURCE_ARTIFACT_DIR=/app/uploads/source-artifacts
      - BUILD_MAX_LOG_BYTES=${BUILD_MAX_LOG_BYTES:-200000}
      - BUILD_CLONE_TIMEOUT_SECONDS=${BUILD_CLONE_TIMEOUT_SECONDS:-120}
      - BUILD_COMMAND_TIMEOUT_SECONDS=${BUILD_COMMAND_TIMEOUT_SECONDS:-900}
      - BUILD_DOCKER_MEMORY=${BUILD_DOCKER_MEMORY:-1g}
      - DOKSCP_CI_NO_CHECKS_GRACE_SECONDS=${DOKSCP_CI_NO_CHECKS_GRACE_SECONDS:-30}
      - LOCAL_SOURCE_ROOTS=${LOCAL_SOURCE_ROOTS:-/app/local-projects}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GITHUB_CALLBACK_URL=${GITHUB_CALLBACK_URL:-https://${DOKSCP_DOMAIN}/api/v1/auth/github/callback}
      - GITHUB_OAUTH_REDIRECT_URL=${GITHUB_OAUTH_REDIRECT_URL:-}
      - GITHUB_FORCE_REDIRECT_URI=${GITHUB_FORCE_REDIRECT_URI:-false}
      - GITHUB_APP_WEBHOOK_MODE=${GITHUB_APP_WEBHOOK_MODE:-false}
      - GITHUB_APP_NAME=${GITHUB_APP_NAME:-DOKSCP}
      - GITHUB_APP_SLUG=${GITHUB_APP_SLUG:-}
      - GITHUB_APP_ID=${GITHUB_APP_ID:-}
      - GITHUB_APP_CLIENT_ID=${GITHUB_APP_CLIENT_ID:-}
      - GITHUB_APP_CLIENT_SECRET=${GITHUB_APP_CLIENT_SECRET:-}
      - GITHUB_APP_PRIVATE_KEY_PATH=${GITHUB_APP_PRIVATE_KEY_PATH:-}
      - GITHUB_APP_PRIVATE_KEY_BASE64=${GITHUB_APP_PRIVATE_KEY_BASE64:-}
      - K8S_NAMESPACE=${K8S_NAMESPACE:-dokscp-apps}
      - K8S_SERVICE_TYPE=${K8S_SERVICE_TYPE:-NodePort}
      - K8S_EXPOSURE_MODE=${K8S_EXPOSURE_MODE:-ingress}
      - K8S_NODE_HOST=${K8S_NODE_HOST:-localhost}
      - K8S_BASE_DOMAIN=${K8S_BASE_DOMAIN:-}
      - K8S_RUNTIME_SCHEME=${K8S_RUNTIME_SCHEME:-https}
      - K8S_INGRESS_CLASS=${K8S_INGRESS_CLASS:-nginx}
      - K8S_CERT_CLUSTER_ISSUER=${K8S_CERT_CLUSTER_ISSUER:-letsencrypt-prod}
      - K8S_INGRESS_TLS_SECRET=${K8S_INGRESS_TLS_SECRET:-}
      - K8S_INGRESS_ANNOTATIONS_JSON=${K8S_INGRESS_ANNOTATIONS_JSON:-}
      - REMOTE_K8S_BASE_DOMAIN=${REMOTE_K8S_BASE_DOMAIN:-}
      - REMOTE_K8S_INGRESS_CLASS=${REMOTE_K8S_INGRESS_CLASS:-auto}
      - REMOTE_K8S_CERT_CLUSTER_ISSUER=${REMOTE_K8S_CERT_CLUSTER_ISSUER:-letsencrypt-prod}
      - REMOTE_K8S_CERT_MANAGER_VERSION=${REMOTE_K8S_CERT_MANAGER_VERSION:-v1.15.3}
      - K8S_NAMESPACE_PREFIX=${K8S_NAMESPACE_PREFIX:-}
      - K8S_IMAGE_PULL_SECRET=${K8S_IMAGE_PULL_SECRET:-}
      - K8S_SERVICE_ACCOUNT_NAME=${K8S_SERVICE_ACCOUNT_NAME:-}
      - K8S_ENABLE_PDB=${K8S_ENABLE_PDB:-true}
      - K8S_ENABLE_HPA=${K8S_ENABLE_HPA:-false}
      - K8S_HPA_MIN_REPLICAS=${K8S_HPA_MIN_REPLICAS:-1}
      - K8S_HPA_MAX_REPLICAS=${K8S_HPA_MAX_REPLICAS:-3}
      - K8S_HPA_CPU_UTILIZATION=${K8S_HPA_CPU_UTILIZATION:-70}
      - K8S_MAX_REPLICAS=${K8S_MAX_REPLICAS:-10}
      - K8S_CPU_REQUEST=${K8S_CPU_REQUEST:-100m}
      - K8S_MEMORY_REQUEST=${K8S_MEMORY_REQUEST:-128Mi}
      - K8S_CPU_LIMIT=${K8S_CPU_LIMIT:-500m}
      - K8S_MEMORY_LIMIT=${K8S_MEMORY_LIMIT:-512Mi}
      - K8S_PROBE_PATH=${K8S_PROBE_PATH:-/}
      - K8S_READINESS_INITIAL_DELAY_SECONDS=${K8S_READINESS_INITIAL_DELAY_SECONDS:-5}
      - K8S_LIVENESS_INITIAL_DELAY_SECONDS=${K8S_LIVENESS_INITIAL_DELAY_SECONDS:-15}
      - K8S_STARTUP_FAILURE_THRESHOLD=${K8S_STARTUP_FAILURE_THRESHOLD:-30}
      - K8S_ROLLOUT_TIMEOUT_SECONDS=${K8S_ROLLOUT_TIMEOUT_SECONDS:-180}
      - KUBECONFIG_PATH=${KUBECONFIG_PATH:-/root/.kube/config}
      - KUBECONFIG=/root/.kube/config
      - DOKSCP_AI_ENABLED=${DOKSCP_AI_ENABLED:-true}
      - DOKSCP_AI_SERVICE_URL=${DOKSCP_AI_SERVICE_URL:-http://ai-service:8010}
      - DOKSCP_AI_PROVIDER=${DOKSCP_AI_PROVIDER:-nvidia_nim}
      - DOKSCP_AI_MODEL=${DOKSCP_AI_MODEL:-}
      - DOKSCP_AI_CONFIDENCE_THRESHOLD=${DOKSCP_AI_CONFIDENCE_THRESHOLD:-0.72}
      - DOKSCP_AI_RATE_LIMIT_PER_MINUTE=${DOKSCP_AI_RATE_LIMIT_PER_MINUTE:-12}
      - DOKSCP_AI_MAX_CONTEXT_BYTES=${DOKSCP_AI_MAX_CONTEXT_BYTES:-32000}
      - DOKSCP_AI_SERVICE_TIMEOUT_SECONDS=${DOKSCP_AI_SERVICE_TIMEOUT_SECONDS:-120}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY:-}
      - NVIDIA_NIM_BASE_URL=${NVIDIA_NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - NVIDIA_NIM_MODEL=${NVIDIA_NIM_MODEL:-meta/llama-3.1-70b-instruct}
      - NVIDIA_NIM_FAST_MODEL=${NVIDIA_NIM_FAST_MODEL:-meta/llama-3.1-8b-instruct}
      - NVIDIA_NIM_THINKING_MODEL=${NVIDIA_NIM_THINKING_MODEL:-meta/llama-3.1-70b-instruct}
      - NVIDIA_NIM_ALLOWED_MODELS=${NVIDIA_NIM_ALLOWED_MODELS:-}
      - NVIDIA_NIM_DISCOVER_MODELS=${NVIDIA_NIM_DISCOVER_MODELS:-true}
      - NVIDIA_NIM_PROBE_MODELS=${NVIDIA_NIM_PROBE_MODELS:-true}
      - OPENAI_COMPATIBLE_BASE_URL=${OPENAI_COMPATIBLE_BASE_URL:-}
      - OPENAI_COMPATIBLE_API_KEY=${OPENAI_COMPATIBLE_API_KEY:-}
      - OPENAI_COMPATIBLE_MODEL=${OPENAI_COMPATIBLE_MODEL:-}
      - OPENAI_COMPATIBLE_THINKING_MODEL=${OPENAI_COMPATIBLE_THINKING_MODEL:-}
    expose:
      - "8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./uploads:/app/uploads
      - ${DOKSCP_LOCAL_PROJECTS_DIR:-./local-projects}:/app/local-projects:ro
      - ${KUBECONFIG_HOST_PATH:-./config/kubeconfig}:/root/.kube/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8090/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: dokscp-ai-service
    restart: unless-stopped
    logging: *dokscp-logging
    environment:
      - DOKSCP_AI_PROVIDER=${DOKSCP_AI_PROVIDER:-nvidia_nim}
      - DOKSCP_AI_MODEL=${DOKSCP_AI_MODEL:-}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY:-}
      - NVIDIA_NIM_BASE_URL=${NVIDIA_NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - NVIDIA_NIM_MODEL=${NVIDIA_NIM_MODEL:-meta/llama-3.1-70b-instruct}
      - NVIDIA_NIM_FAST_MODEL=${NVIDIA_NIM_FAST_MODEL:-meta/llama-3.1-8b-instruct}
      - NVIDIA_NIM_THINKING_MODEL=${NVIDIA_NIM_THINKING_MODEL:-meta/llama-3.1-70b-instruct}
      - NVIDIA_NIM_ALLOWED_MODELS=${NVIDIA_NIM_ALLOWED_MODELS:-}
      - NVIDIA_NIM_DISCOVER_MODELS=${NVIDIA_NIM_DISCOVER_MODELS:-true}
      - NVIDIA_NIM_PROBE_MODELS=${NVIDIA_NIM_PROBE_MODELS:-true}
      - NVIDIA_NIM_MODEL_PROBE_LIMIT=${NVIDIA_NIM_MODEL_PROBE_LIMIT:-100}
      - OPENAI_COMPATIBLE_BASE_URL=${OPENAI_COMPATIBLE_BASE_URL:-}
      - OPENAI_COMPATIBLE_API_KEY=${OPENAI_COMPATIBLE_API_KEY:-}
      - OPENAI_COMPATIBLE_MODEL=${OPENAI_COMPATIBLE_MODEL:-}
      - OPENAI_COMPATIBLE_THINKING_MODEL=${OPENAI_COMPATIBLE_THINKING_MODEL:-}
      - DOKSCP_AI_REQUEST_TIMEOUT_SECONDS=${DOKSCP_AI_REQUEST_TIMEOUT_SECONDS:-90}
      - DOKSCP_AI_MAX_TEXT_BYTES=${DOKSCP_AI_MAX_TEXT_BYTES:-24000}
    expose:
      - "8010"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8010/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api/v1
        NEXT_PUBLIC_WS_BASE_URL: wss://${DOKSCP_DOMAIN:?Set DOKSCP_DOMAIN in .env}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_GITHUB_CLIENT_ID: ${NEXT_PUBLIC_GITHUB_CLIENT_ID:-}
    container_name: dokscp-frontend
    restart: unless-stopped
    logging: *dokscp-logging
    environment:
      - NODE_ENV=production
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
      - NEXT_PUBLIC_GITHUB_CLIENT_ID=${NEXT_PUBLIC_GITHUB_CLIENT_ID:-}
    expose:
      - "3000"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: dokscp-prometheus
    restart: unless-stopped
    logging: *dokscp-logging
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}"
      - "--web.external-url=https://${DOKSCP_DOMAIN:?Set DOKSCP_DOMAIN in .env}/prometheus"
      - "--web.route-prefix=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend

  loki:
    image: grafana/loki:3.4.2
    container_name: dokscp-loki
    restart: unless-stopped
    logging: *dokscp-logging
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./observability/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.4.2
    container_name: dokscp-promtail
    restart: unless-stopped
    logging: *dokscp-logging
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: dokscp-cadvisor
    restart: unless-stopped
    logging: *dokscp-logging
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  grafana:
    image: grafana/grafana-oss:11.5.2
    container_name: dokscp-grafana
    restart: unless-stopped
    logging: *dokscp-logging
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=https://${DOKSCP_DOMAIN:?Set DOKSCP_DOMAIN in .env}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  loki_data:
  grafana_data:
